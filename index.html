<!DOCTYPE html>
<html lang="es">
<head>
  <title>El GRAN Torneo de Fútbol - UHS</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>El GRAN Torneo de Fútbol</h1>
  <p class="subtitle">UHS</p>

  <div class="tabs">
    <button id="tab-tabla" class="tab active" onclick="showTab('tabla')">Tabla</button>
    <button id="tab-fixture" class="tab" onclick="showTab('fixture')">Fixture</button>
  </div>

  <div id="tabla" class="seccion">
    <h2>Tabla de Posiciones</h2>
    <div class="table-container">
      <table id="tabla-posiciones">
        <thead>
          <tr>
            <th>#</th><th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="fixture" class="seccion" style="display:none">
    <h2>Fixture</h2>
    <div id="fixture-container"></div>
  </div>

  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal-contenido">
      <h3 id="modal-titulo"></h3>
      <div class="modal-inputs">
        <input id="input-home" type="number" min="0">
        <span>-</span>
        <input id="input-away" type="number" min="0">
      </div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-guardar" onclick="guardarResultado()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
