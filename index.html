<!DOCTYPE html>
<html lang="es">
<head>
  <title>El GRAN Torneo de Fútbol - UHS</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="contenedor">
    <h1>El GRAN Torneo de Fútbol</h1>
    <p class="subtitle">UHS</p>

    <div class="tabs">
      <button id="tab-tabla" class="tab active" onclick="showTab('tabla')">Tabla</button>
      <button id="tab-fixture" class="tab" onclick="showTab('fixture')">Fixture</button>
      <button id="tab-proxima" class="tab" onclick="showTab('proxima')">Próxima Fecha</button>
    </div>

    <div id="tabla" class="seccion">
      <h2>Tabla de Posiciones</h2>
      <div class="table-container">
        <table id="tabla-posiciones">
          <thead>
            <tr>
              <th>#</th><th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="fixture" class="seccion" style="display:none">
      <h2>Fixture</h2>
      <div id="fixture-container"></div>
    </div>

    <div id="proxima" class="seccion" style="display:none">
      <h2>Próxima Fecha</h2>
      <div id="proxima-container"></div>
    </div>

  </div>

  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal-contenido">
      <h3 id="modal-titulo"></h3>
      <div class="modal-inputs">
        <input id="input-home" type="number" min="0">
        <span>-</span>
        <input id="input-away" type="number" min="0">
      </div>
      <div class="modal-botones">
        <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-guardar" onclick="guardarResultado()">Guardar</button>
      </div>
    </div>
  </div>

  <div id="modal-equipo">
    <div class="modal-equipo-contenido">
      <h3 id="modal-equipo-titulo"></h3>
      <div id="modal-equipo-partidos"></div>
      <button class="btn-cerrar-equipo" onclick="cerrarModalEquipo()">Cerrar</button>
    </div>
  </div>

  <!-- MODAL CLAVE -->
  <div id="modal-clave" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:30px;width:320px;box-shadow:0 8px 30px rgba(0,0,0,0.3);border-top:4px solid #1A4F9C;">
      <h3 id="modal-clave-titulo" style="margin:0 0 15px;color:#1A4F9C;font-size:1rem;text-align:center;"></h3>
      <input id="modal-clave-input" type="password" placeholder="Ingresá la clave" 
             style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:1rem;box-sizing:border-box;outline:none;"/>
      <div style="display:flex;gap:10px;margin-top:15px;">
        <button onclick="cerrarModalClave()" style="flex:1;padding:10px;border:2px solid #ccc;background:#fff;border-radius:8px;cursor:pointer;font-size:0.95rem;">Cancelar</button>
        <button id="modal-clave-confirmar" style="flex:1;padding:10px;background:#1A4F9C;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem;font-weight:bold;">OK</button>
      </div>
    </div>
  </div>

  <!-- MODAL MENSAJE -->
  <div id="modal-mensaje" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
    <div class="modal-mensaje-box" style="background:#fff;border-radius:12px;padding:30px;width:300px;box-shadow:0 8px 30px rgba(0,0,0,0.3);text-align:center;">
      <p id="modal-mensaje-texto" style="margin:0 0 20px;font-size:1rem;color:#333;"></p>
      <button onclick="cerrarModalMensaje()" style="padding:10px 30px;background:#1A4F9C;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem;font-weight:bold;">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
